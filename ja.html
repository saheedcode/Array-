<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Task Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white w-full max-w-2xl p-6 rounded-2xl shadow-lg">
    
    <!-- Header -->
    <h1 class="text-2xl font-bold mb-2">Live Task Board</h1>
    <p class="text-sm text-gray-500 mb-4">
      Active: <span id="activeCount">0</span> | Completed: <span id="doneCount">0</span>
    </p>

    <!-- Input -->
    <div class="flex gap-2 mb-4">
      <input id="taskInput" type="text" placeholder="Enter task..."
        class="flex-1 border rounded-lg px-3 py-2 outline-none">
      <button onclick="addTask()" class="bg-blue-500 text-white px-4 rounded-lg">
        Add
      </button>
    </div>

    <!-- Filters -->
    <div class="flex gap-2 mb-4">
      <button onclick="setFilter('all')" class="filter-btn bg-gray-200 px-3 py-1 rounded">All</button>
      <button onclick="setFilter('active')" class="filter-btn bg-gray-200 px-3 py-1 rounded">Active</button>
      <button onclick="setFilter('done')" class="filter-btn bg-gray-200 px-3 py-1 rounded">Done</button>
    </div>

    <!-- Task List -->
    <div id="taskList" class="space-y-3"></div>

  </div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filter = "all";

function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
  const input = document.getElementById("taskInput");
  const text = input.value.trim();
  if (!text) return;

  tasks.push({ id: Date.now(), text, done: false });
  input.value = "";

  saveTasks();
  renderTasks();
}

document.getElementById("taskInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") addTask();
});

function toggleDone(id) {
  tasks = tasks.map(task =>
    task.id === id ? { ...task, done: !task.done } : task
  );
  saveTasks();
  renderTasks();
}

function deleteTask(id) {
  tasks = tasks.filter(task => task.id !== id);
  saveTasks();
  renderTasks();
}

function editTask(id) {
  const task = tasks.find(t => t.id === id);
  const newText = prompt("Edit task:", task.text);
  if (newText !== null && newText.trim() !== "") {
    task.text = newText.trim();
    saveTasks();
    renderTasks();
  }
}

function setFilter(type) {
  filter = type;
  renderTasks();
}

function renderTasks() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  let active = 0;
  let done = 0;

  let filteredTasks = tasks.filter(task => {
    if (filter === "active") return !task.done;
    if (filter === "done") return task.done;
    return true;
  });

  filteredTasks.forEach(task => {
    if (task.done) done++;
    else active++;

    const div = document.createElement("div");
    div.className = "p-3 border rounded-lg flex justify-between items-center";

    div.innerHTML = `
      <span class="${task.done ? 'line-through text-gray-400' : ''}">
        ${task.text}
      </span>
      <div class="flex gap-2">
        <button onclick="toggleDone(${task.id})"
          class="bg-green-500 text-white px-2 py-1 rounded">
          Done
        </button>
        <button onclick="editTask(${task.id})"
          class="bg-yellow-500 text-white px-2 py-1 rounded">
          Edit
        </button>
        <button onclick="deleteTask(${task.id})"
          class="bg-red-500 text-white px-2 py-1 rounded">
          Delete
        </button>
      </div>
    `;

    list.appendChild(div);
  });

  // Count totals from ALL tasks (not filtered)
  const totalActive = tasks.filter(t => !t.done).length;
  const totalDone = tasks.filter(t => t.done).length;

  document.getElementById("activeCount").textContent = totalActive;
  document.getElementById("doneCount").textContent = totalDone;
}

renderTasks();
</script>

</body>
</html>
