<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loop Demo</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f7fb;
    padding: 30px;
}

button {
    padding: 10px 20px;
    border: none;
    background: blue;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

#output {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, 80px);
    gap: 10px;
    justify-content: center;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h1>🔁 Loop Visualizer</h1>

<button id="startBtn">Run Loop</button>

<div id="output"></div>

<script>
const btn = document.getElementById("startBtn")
const output = document.getElementById("output")

btn.addEventListener("click", () => {
    output.innerHTML = "" // clear old result

    for (let i = 1; i <= 10; i++) {

        const box = document.createElement("div")
        box.className = "box"
        box.textContent = i

        output.appendChild(box)
    }
})
</script>

</body>
</html>
