<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JavaScript Master Website</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      display: flex;
    }

    nav {
      width: 200px;
      background: #333;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    nav a {
      display: block;
      color: white;
      margin: 10px 0;
      text-decoration: none;
      cursor: pointer;
    }

    main {
      flex: 1;
      padding: 20px;
    }

    .hidden {
      display: none;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }

    .cart-item {
      border-bottom: 1px solid #ccc;
      padding: 5px;
    }
  </style>
</head>
<body>

<nav>
  <h3>Menu</h3>
  <a onclick="showPage('home')">Home</a>
  <a onclick="showPage('todo')">Todo App</a>
  <a onclick="showPage('api')">API Data</a>
  <a onclick="showPage('cart')">Cart</a>
</nav>

<main>
  <!-- HOME -->
  <section id="home">
    <h1>Welcome</h1>
    <p>This website shows full JavaScript skills.</p>
  </section>

  <!-- TODO -->
  <section id="todo" class="hidden">
    <h2>Todo App</h2>
    <input id="todoInput" placeholder="Enter task">
    <button onclick="addTodo()">Add</button>
    <ul id="todoList"></ul>
  </section>

  <!-- API -->
  <section id="api" class="hidden">
    <h2>API Data</h2>
    <button onclick="getUsers()">Load Users</button>
    <ul id="users"></ul>
  </section>

  <!-- CART -->
  <section id="cart" class="hidden">
    <h2>Shopping Cart</h2>
    <div id="products"></div>
    <h3>Cart</h3>
    <div id="cartItems"></div>
    <p>Total: $<span id="total">0</span></p>
  </section>
</main>

<script>
  // Navigation
  function showPage(page) {
    document.querySelectorAll('main section').forEach(sec => sec.classList.add('hidden'));
    document.getElementById(page).classList.remove('hidden');
  }

  // Todo App
  let todos = [];

  function addTodo() {
    const input = document.getElementById('todoInput');
    const value = input.value;

    if (!value) return;

    todos.push(value);
    input.value = '';
    renderTodos();
  }

  function renderTodos() {
    const list = document.getElementById('todoList');
    list.innerHTML = '';

    todos.forEach((todo, index) => {
      const li = document.createElement('li');
      li.textContent = todo;

      const btn = document.createElement('button');
      btn.textContent = 'Delete';
      btn.onclick = () => {
        todos.splice(index, 1);
        renderTodos();
      };

      li.appendChild(btn);
      list.appendChild(li);
    });
  }

  // API Fetch
  async function getUsers() {
    const res = await fetch('https://jsonplaceholder.typicode.com/users');
    const data = await res.json();

    const list = document.getElementById('users');
    list.innerHTML = '';

    data.forEach(user => {
      const li = document.createElement('li');
      li.textContent = user.name;
      list.appendChild(li);
    });
  }

  // Cart
  const products = [
    { name: 'Laptop', price: 500 },
    { name: 'Phone', price: 300 },
    { name: 'Headset', price: 50 }
  ];

  let cart = [];

  function renderProducts() {
    const container = document.getElementById('products');

    products.forEach((p, index) => {
      const div = document.createElement('div');
      div.innerHTML = `${p.name} - $${p.price}`;

      const btn = document.createElement('button');
      btn.textContent = 'Add to Cart';
      btn.onclick = () => addToCart(index);

      div.appendChild(btn);
      container.appendChild(div);
    });
  }

  function addToCart(index) {
    cart.push(products[index]);
    renderCart();
  }

  function renderCart() {
    const container = document.getElementById('cartItems');
    const totalEl = document.getElementById('total');

    container.innerHTML = '';
    let total = 0;

    cart.forEach((item, index) => {
      total += item.price;

      const div = document.createElement('div');
      div.className = 'cart-item';
      div.textContent = `${item.name} - $${item.price}`;

      const btn = document.createElement('button');
      btn.textContent = 'Remove';
      btn.onclick = () => {
        cart.splice(index, 1);
        renderCart();
      };

      div.appendChild(btn);
      container.appendChild(div);
    });

    totalEl.textContent = total;
  }

  renderProducts();

 //async function getData() {
 // const res = await fetch("https://jsonplaceholder.typicode.com/todos");
  //const data = await res.json();

 // console.log(data);
//}

//getData();
</script>

</body>
</html>
